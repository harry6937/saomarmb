<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M2 汇率套利计算器</title>

<style>
body { font-family: Arial; padding: 10px; background:#f5f5f5; }
.container { max-width: 500px; margin:auto; }
input, button { width:100%; padding:10px; margin:5px 0; font-size:16px; }
button { background:#d32f2f; color:#fff; border:none; }
.tabs { display:flex; margin-bottom:10px; }
.tab { flex:1; padding:10px; text-align:center; background:#ddd; }
.active { background:#d32f2f; color:#fff; }
table { width:100%; border-collapse:collapse; background:#fff; margin-top:10px; }
th, td { border:1px solid #ddd; padding:8px; text-align:center; font-size:14px; }
th { background:#d32f2f; color:#fff; }
.card { margin-bottom:15px; }
</style>
</head>

<body>
<div class="container">

<div class="tabs">
<div class="tab active" onclick="showTab(1)">资产</div>
<div class="tab" onclick="showTab(2)">计算</div>
<div class="tab" onclick="showTab(3)">统计</div>
</div>

<!-- TAB1 -->
<div id="tab1">
<h3>当前总资产: <span id="totalAsset">0</span> RMB</h3>

<input id="buyAmount" placeholder="购买金额" type="number">

<button onclick="buyRMB()">➕ 购买</button>
<button onclick="addFund()">➕ 添加资金</button>
<button onclick="openExpenseModal()">➖ 支出</button>

<div id="assetRecords"></div>
</div>

<!-- 支出弹窗 -->
<div id="expenseModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);">
 <div style="background:#fff;padding:15px;margin:100px auto;width:90%;max-width:400px;border-radius:10px;">
  <h3>支出</h3>
  <input id="expenseAmount" placeholder="支出金额" type="number">
  <input id="expenseNote" placeholder="备注">
  <button onclick="addExpense();closeModal()">确认</button>
  <button onclick="closeModal()">取消</button>
 </div>
</div>

<!-- TAB2 -->
<div id="tab2" style="display:none">
<h3>当前总资产: <span id="totalAsset2">0</span> RMB</h3>
<input id="amount" placeholder="金额 RMB" type="number">
<input id="rate1" placeholder="卖出汇率" type="number">
<input id="rate2" placeholder="买入汇率" type="number">
<input id="fee" value="0.6" type="number">
<button onclick="calculate()">计算</button>
<div id="result"></div>
<button onclick="saveRecord()">出售并记录</button>
<div id="records"></div>
</div>

<!-- TAB3 -->
<div id="tab3" style="display:none">
<h3>总览</h3>
<div class="card" id="summary"></div>

<h3>购买统计</h3>
<div class="card" id="buySummary"></div>

<h3>每日统计</h3>
<div class="card" id="stats"></div>
</div>

<script>

// ===== 删除（带确认）=====
function deleteAsset(index){
 if(!confirm('确定要删除这条记录吗？')) return;

 let data = JSON.parse(localStorage.getItem('asset')||'[]');
 data.splice(index,1);
 localStorage.setItem('asset', JSON.stringify(data));
 render();
}

// ===== TAB =====
function showTab(tab){
 document.getElementById('tab1').style.display = tab===1?'block':'none';
 document.getElementById('tab2').style.display = tab===2?'block':'none';
 document.getElementById('tab3').style.display = tab===3?'block':'none';
}

// ===== 弹窗 =====
function openExpenseModal(){ document.getElementById('expenseModal').style.display='block'; }
function closeModal(){ document.getElementById('expenseModal').style.display='none'; }

// ===== 购买（扣0.6%）=====
function buyRMB(){
 let amount = parseFloat(document.getElementById('buyAmount').value);
 if(!amount) return alert('输入金额');

 let final = amount * (1-0.006);

 let data = JSON.parse(localStorage.getItem('asset')||'[]');
 data.push({amount:final,date:new Date().toLocaleDateString(),type:'buy'});
 localStorage.setItem('asset', JSON.stringify(data));
 render();
}

// ===== 添加资金（不扣）=====
function addFund(){
 let amount = parseFloat(document.getElementById('buyAmount').value);
 if(!amount) return alert('输入金额');

 let data = JSON.parse(localStorage.getItem('asset')||'[]');
 data.push({amount:amount,date:new Date().toLocaleDateString(),type:'fund'});
 localStorage.setItem('asset', JSON.stringify(data));
 render();
}

// ===== 支出 =====
function addExpense(){
 let amount = parseFloat(document.getElementById('expenseAmount').value);
 let note = document.getElementById('expenseNote').value || '';

 if(!amount) return alert('输入支出金额');

 let data = JSON.parse(localStorage.getItem('asset')||'[]');
 data.push({amount:-amount,date:new Date().toLocaleDateString(),note:note,type:'expense'});
 localStorage.setItem('asset', JSON.stringify(data));
 render();
}

// ===== 总资产 =====
function getTotalAsset(){
 let data = JSON.parse(localStorage.getItem('asset')||'[]');
 return data.reduce((a,b)=>a+(parseFloat(b.amount)||0),0);
}

// ===== 计算 =====
let currentData=null;

function calculate(){
 let amount = parseFloat(document.getElementById('amount').value);
 let r1 = parseFloat(document.getElementById('rate1').value);
 let r2 = parseFloat(document.getElementById('rate2').value);
 let fee = parseFloat(document.getElementById('fee').value)/100;

 if(!amount || !r1 || !r2) return alert('请输入完整');

 let mmk = amount / r1;
 let rmbBack = mmk * r2;
 let final = rmbBack * (1-fee);
 let profit = final - amount;
 let percent = profit/amount*100;

 currentData = { amount, profit, percent, rate1:r1, rate2:r2 };

 document.getElementById('result').innerHTML =
 `利润:${profit.toFixed(2)} 差价:${percent.toFixed(2)}%`;
}

function saveRecord(){
 if(!currentData) return alert('先计算');

 let data = JSON.parse(localStorage.getItem('records')||'[]');
 data.push({...currentData,date:new Date().toLocaleDateString()});
 localStorage.setItem('records', JSON.stringify(data));

 let assetData = JSON.parse(localStorage.getItem('asset')||'[]');
 assetData.push({amount:-currentData.amount,date:new Date().toLocaleDateString()});
 localStorage.setItem('asset', JSON.stringify(assetData));

 render();
}

// ===== 渲染 =====
function render(){

 let assetData = JSON.parse(localStorage.getItem('asset')||'[]');
 let total = getTotalAsset();

 document.getElementById('totalAsset').innerText = total.toFixed(2);
 document.getElementById('totalAsset2').innerText = total.toFixed(2);

 //资产表
 let html='<table><tr><th>日期</th><th>类型</th><th>资产变化</th><th>备注</th><th>操作</th></tr>';
 assetData.forEach((r,i)=>{
 let typeText =
  r.type==='expense' ? '支出' :
  r.type==='fund' ? '资金' :
  '购买';

 html+=`<tr>
 <td>${r.date}</td>
 <td>${typeText}</td>
 <td>${(parseFloat(r.amount)||0).toFixed(2)}</td>
 <td>${r.note||''}</td>
 <td><button onclick="deleteAsset(${i})">删除</button></td>
 </tr>`;
 });
 html+='</table>';
 document.getElementById('assetRecords').innerHTML=html;

 //记录表
 let data = JSON.parse(localStorage.getItem('records')||'[]');
 let table='<table><tr><th>日期</th><th>金额</th><th>卖出</th><th>买入</th><th>利润</th><th>%</th></tr>';
 data.forEach(r=>{
 table+=`<tr>
 <td>${r.date}</td>
 <td>${r.amount}</td>
 <td>${r.rate1}</td>
 <td>${r.rate2}</td>
 <td>${r.profit.toFixed(2)}</td>
 <td>${r.percent.toFixed(2)}%</td>
 </tr>`;
 });
 table+='</table>';
 document.getElementById('records').innerHTML=table;

 //统计
 let stats={}, assetStats={};

 data.forEach(r=>{
  if(!stats[r.date]) stats[r.date]={profit:0,amount:0};
  stats[r.date].profit+=(parseFloat(r.profit)||0);
  stats[r.date].amount+=(parseFloat(r.amount)||0);
 });

 assetData.forEach(r=>{
  if(!assetStats[r.date]) assetStats[r.date]=0;
  if(r.amount>0) assetStats[r.date]+=(parseFloat(r.amount)||0);
 });

 let totalProfitAll=0,totalBuyAll=0;
 Object.keys(stats).forEach(d=> totalProfitAll+=stats[d].profit);
 Object.keys(assetStats).forEach(d=> totalBuyAll+=assetStats[d]);

 document.getElementById('summary').innerHTML=`
 <table>
 <tr><th>总购买</th><th>总利润</th><th>当前总资产</th></tr>
 <tr>
 <td>${totalBuyAll.toFixed(2)}</td>
 <td>${totalProfitAll.toFixed(2)}</td>
 <td>${total.toFixed(2)}</td>
 </tr>
 </table>`;

 let buyTable='<table><tr><th>购买日期</th><th>购买总金额</th></tr>';
 Object.keys(assetStats).forEach(d=>{
  buyTable+=`<tr><td>${d}</td><td>${assetStats[d].toFixed(2)}</td></tr>`;
 });
 buyTable+='</table>';
 document.getElementById('buySummary').innerHTML=buyTable;

 let s='<table><tr><th>日期</th><th>总购买</th><th>总利润</th></tr>';
 let allDates = Array.from(new Set([...Object.keys(stats),...Object.keys(assetStats)]));

 allDates.forEach(d=>{
  let totalProfit = stats[d]?stats[d].profit:0;
  let totalBuy = assetStats[d]?assetStats[d]:0;

  s+=`<tr>
  <td>${d}</td>
  <td>${totalBuy.toFixed(2)}</td>
  <td>${totalProfit.toFixed(2)}</td>
  </tr>`;
 });

 s+='</table>';
 document.getElementById('stats').innerHTML=s;
}

render();

</script>
</body>
</html>
